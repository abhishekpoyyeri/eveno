            background: rgba(255, 255, 255, 0.7);

            -webkit-backdrop-filter: blur(12px);
        }

            background-color: #FAFAFA;
        }

        ::-webkit-scrollbar {
            width: 6px;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="pearl-bg min-h-screen font-body-md text-on-surface">
<!-- Top Navigation Anchor (Shared Component) -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-14 md:h-20 w-full max-w-container-max mx-auto">
<h1 class="font-display-lg text-headline-md tracking-tight text-primary">Eveno</h1>
<div class="flex items-center gap-stack-md">
<span class="material-symbols-outlined text-primary text-2xl">menu</span>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-lg">person</span>
</div>
</div>
</div>
</header>
<main class="relative min-h-screen pt-20 pb-16 flex flex-col items-center justify-center px-margin-mobile">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] rounded-full bg-primary-fixed-dim/20 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] rounded-full bg-tertiary-fixed/20 blur-[120px]"></div>
</div>
<!-- Verification Card Container -->
<div class="glass-card relative z-10 w-full max-w-[480px] rounded-2xl border border-white/50 shadow-[0px_10px_30px_rgba(0,0,0,0.04)] p-stack-lg flex flex-col items-center text-center">
<!-- Branding Icon -->
<div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-stack-md animate-pulse">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="verified_user" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<!-- Content -->
<h2 class="font-headline-md text-headline-md text-primary mb-2">Verify Your Identity</h2>
<p class="font-body-md text-on-surface-variant mb-stack-lg">To maintain our premium event standard, we require a quick identity check. This only takes a minute.</p>
<!-- Verification Options -->
<div class="w-full space-y-stack-md mb-stack-lg">
<!-- Option 1: ID Upload -->
<button class="w-full group flex items-center p-4 bg-white border border-primary-fixed-dim/40 rounded-xl hover:border-primary transition-all duration-300 hover:shadow-md text-left">
<div class="w-12 h-12 rounded-lg bg-surface flex items-center justify-center mr-4 group-hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="badge">badge</span>
</div>
<div class="flex-1">
<span class="block font-bold text-primary">Upload ID Document</span>
<span class="block text-xs text-on-surface-variant font-micro-label">Passport, License, or ID Card</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Option 2: Selfie -->
<button class="w-full group flex items-center p-4 bg-white border border-primary-fixed-dim/40 rounded-xl hover:border-primary transition-all duration-300 hover:shadow-md text-left">
<div class="w-12 h-12 rounded-lg bg-surface flex items-center justify-center mr-4 group-hover:bg-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="flex-1">
<span class="block font-bold text-primary">Take a Selfie</span>
<span class="block text-xs text-on-surface-variant font-micro-label">Live facial recognition check</span>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-fixed-dim text-on-primary-fixed-variant font-bold py-4 px-6 rounded-full opacity-60 cursor-not-allowed mb-stack-md transition-all" disabled="">
                Submit Verification
            </button>
<!-- Footer Link -->
<button class="text-on-surface-variant hover:text-primary transition-colors font-micro-label uppercase tracking-widest text-xs">
                Skip for now
            </button>
</div>
<!-- Bottom Security Badge -->
<div class="mt-stack-lg flex items-center gap-2 text-outline">
<span class="material-symbols-outlined text-sm" data-icon="lock" style="font-variation-settings: 'wght' 200;">lock</span>
<span class="font-micro-label text-[10px]">ENCRYPTED WITH 256-BIT SSL SECURITY</span>
</div>
</main>
<!-- Footer Anchor (Shared Component Logic) -->
<footer class="w-full py-section-gap bg-inverse-surface mt-auto">
<div class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-stack-lg">
<span class="font-display-lg text-headline-md text-surface-container-lowest">Eveno</span>
<p class="text-surface-variant font-body-md text-sm">© 2024 Eveno Platform. All rights reserved.</p>
<div class="flex gap-stack-md">
<a class="text-surface-variant hover:text-tertiary-fixed-dim transition-colors text-sm" href="#">Privacy Policy</a>
<a class="text-surface-variant hover:text-tertiary-fixed-dim transition-colors text-sm" href="#">Terms of Service</a>
<a class="text-surface-variant hover:text-tertiary-fixed-dim transition-colors text-sm" href="#">Help Center</a>
</div>
</div>
</footer>
<!-- Interactive Logic -->
<script>
        // Subtle micro-interaction: Pulse the button if options were selected
        const buttons = document.querySelectorAll('.group');
        const submitBtn = document.querySelector('button[disabled]');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove visual selection from others
                buttons.forEach(b => {
                    b.classList.remove('ring-2', 'ring-primary', 'bg-primary-fixed/30');
                    b.classList.add('bg-white');
                });
                
                // Highlight selected
                btn.classList.add('ring-2', 'ring-primary', 'bg-primary-fixed/30');
                btn.classList.remove('bg-white');

                // Enable Submit (UI Mockup)
                submitBtn.disabled = false;
                submitBtn.classList.remove('bg-primary-fixed-dim', 'opacity-60', 'cursor-not-allowed', 'text-on-primary-fixed-variant');
                submitBtn.classList.add('bg-primary', 'text-white', 'hover:scale-102', 'active:scale-95', 'shadow-lg');
            });
        });
    </script>
</body></html>
